version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: word-filter-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://localhost:4201
    volumes:
      - ./backend/words.txt:/app/words.txt:ro
      - backend-logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/words/stats')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - word-filter-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: word-filter-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - BACKEND_URL=http://backend:8001
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - word-filter-network

volumes:
  backend-logs:
    driver: local

networks:
  word-filter-network:
    driver: bridge
