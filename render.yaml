services:
  - type: web
    name: word-filter-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8001
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGINS
        value: "*"
